name: Setup JS
description: >
  Sets up Bun and installs dependencies.
  Set setup-node to 'true' for workflows that require npm publishing.

inputs:
  setup-node:
    description: "Whether to also set up Node 22 with the npmjs registry"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version: "1.3.12"

    - name: Setup Node
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: "22"
        registry-url: "https://registry.npmjs.org"

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
