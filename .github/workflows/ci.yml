name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  validate-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Apply smoke (isolated config, Unix)
        if: runner.os != 'Windows'
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: |
          mkdir -p "$HOME" "$XDG_CONFIG_HOME"
          bun run apply
          test -f "$XDG_CONFIG_HOME/opencode-aegis/opencode/opencode.json"
          test -f "$XDG_CONFIG_HOME/opencode-aegis/opencode/oh-my-Aegis.json"

      - name: Apply smoke (isolated config, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          USERPROFILE: ${{ runner.temp }}/aegis-userprofile
          APPDATA: ${{ runner.temp }}/aegis-appdata
        run: |
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          New-Item -ItemType Directory -Force -Path $env:APPDATA | Out-Null
          bun run apply
          $expectedDir = Join-Path $env:USERPROFILE ".config/opencode-aegis/opencode"
          $appdataDir = Join-Path $env:APPDATA "opencode-aegis/opencode"
          $found = (Test-Path "$expectedDir/opencode.json") -or (Test-Path "$appdataDir/opencode.json")
          if (!$found) { throw "Missing opencode.json (checked USERPROFILE/.config/opencode-aegis/opencode and APPDATA/opencode-aegis/opencode)" }
          $foundAegis = (Test-Path "$expectedDir/oh-my-Aegis.json") -or (Test-Path "$appdataDir/oh-my-Aegis.json")
          if (!$foundAegis) { throw "Missing oh-my-Aegis.json" }

  integration-gates:
    runs-on: ubuntu-latest
    needs: validate-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Apply smoke (isolated config)
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: |
          mkdir -p "$HOME" "$XDG_CONFIG_HOME"
          bun run apply
          test -f "$XDG_CONFIG_HOME/opencode-aegis/opencode/opencode.json"
          test -f "$XDG_CONFIG_HOME/opencode-aegis/opencode/oh-my-Aegis.json"

      - name: Generate benchmark evidence
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: bun run benchmark:generate

      - name: Benchmark quality gate
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: bun run benchmark:score benchmarks/results.json

      - name: Seed disposable Google auth for doctor
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: |
          mkdir -p "$HOME/.local/share/opencode"
          cat > "$HOME/.local/share/opencode/auth.json" <<'EOF'
          {
            "google": {
              "type": "oauth",
              "refresh": "ci-refresh-token|ci-project|ci-managed-project",
              "access": "ci-access-token",
              "expires": 4102444800000
            }
          }
          EOF

      - name: Doctor
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: bun run doctor

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-evidence
          path: |
            benchmarks/results.json
            benchmarks/evidence
