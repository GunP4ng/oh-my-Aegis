name: Package Deploy Test

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate ref matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
              echo "Tag/package version mismatch: got '${GITHUB_REF_NAME}', expected '${EXPECTED_TAG}'."
              exit 1
            fi
            exit 0
          fi

          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must run on tag '${EXPECTED_TAG}' or on 'main' via workflow_dispatch."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Ensure dist is clean
        run: git diff --exit-code -- dist

      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.PAKAGE_PUBLISH_KEY_NPM }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN is missing or empty. Set secrets.NPM_TOKEN (automation/granular token with publish access and bypass-2fa)."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.PAKAGE_PUBLISH_KEY_NPM }}
        run: npm publish --provenance --access public
