name: Publish
run-name: "release ${{ inputs.bump }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version override (x.y.z, optional)"
        required: false
        type: string

concurrency:
  group: publish-preview
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: preview

      - name: Fetch release refs
        run: git fetch --force origin main preview --tags

      - name: Align local preview branch
        run: git checkout -B preview origin/preview

      - name: Validate release source
        id: release_source
        run: |
          PREVIEW_SHA=$(git rev-parse origin/preview)
          MAIN_SHA=$(git rev-parse origin/main)
          CURRENT_SHA=$(git rev-parse HEAD)

          if [ "$CURRENT_SHA" != "$PREVIEW_SHA" ]; then
            echo "Publish workflow must build from origin/preview." >&2
            echo "HEAD=$CURRENT_SHA" >&2
            echo "origin/preview=$PREVIEW_SHA" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor origin/main origin/preview; then
            echo "origin/preview must fast-forward origin/main before publishing." >&2
            echo "origin/main=$MAIN_SHA" >&2
            echo "origin/preview=$PREVIEW_SHA" >&2
            exit 1
          fi

          BASE_TAG=$(git describe --tags --abbrev=0 origin/preview 2>/dev/null || true)
          if [ -n "$BASE_TAG" ] && ! git merge-base --is-ancestor "$BASE_TAG" origin/preview; then
            echo "Base tag '$BASE_TAG' is not reachable from origin/preview." >&2
            exit 1
          fi

          echo "release_ref=origin/preview" >> "$GITHUB_OUTPUT"
          echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ vars.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release gate
        env:
          HOME: ${{ runner.temp }}/aegis-home
          XDG_CONFIG_HOME: ${{ runner.temp }}/aegis-xdg
        run: |
          mkdir -p "$HOME" "$XDG_CONFIG_HOME" "$HOME/.local/share/opencode"
          cat > "$HOME/.local/share/opencode/auth.json" <<'EOF'
          {
            "google": {
              "type": "oauth",
              "refresh": "ci-refresh-token|ci-project|ci-managed-project",
              "access": "ci-access-token",
              "expires": 4102444800000
            }
          }
          EOF
          bun run typecheck
          bun test
          bun run build
          bun run apply
          bun run benchmark:score benchmarks/results.json
          bun run doctor

      - name: Bump version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          VERSION: ${{ inputs.version }}
        run: |
          NEXT_VERSION=$(bun run release:version --plain)
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Rebuild dist for bumped version
        run: bun run build

      - name: Generate changelog
        env:
          AEGIS_RELEASE_REF: ${{ steps.release_source.outputs.release_ref }}
          AEGIS_RELEASE_BASE_TAG: ${{ steps.release_source.outputs.base_tag }}
        run: bun run release:notes > RELEASE_NOTES.md

      - name: Commit and tag release
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${NEXT_VERSION}"
          git tag "v${NEXT_VERSION}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required for publish workflow." >&2
            exit 1
          fi
          if npm view "oh-my-aegis@${NEXT_VERSION}" version >/dev/null 2>&1; then
            echo "oh-my-aegis@${NEXT_VERSION} is already published. Skipping npm publish step."
            exit 0
          fi
          npm publish --provenance --access public

      - name: Push release commit and tag
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          git push origin preview
          git push origin "v${NEXT_VERSION}"

      - name: Create or update preview -> main sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          PR_TITLE="chore(release): sync preview to main for v${NEXT_VERSION}"
          PR_NUMBER=$(gh pr list --base main --head preview --state open --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body-file RELEASE_NOTES.md
          else
            gh pr create --base main --head preview --title "$PR_TITLE" --body-file RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          if gh release view "v${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "GitHub release v${NEXT_VERSION} already exists. Skipping release creation."
            exit 0
          fi
          gh release create "v${NEXT_VERSION}" --title "v${NEXT_VERSION}" --notes-file RELEASE_NOTES.md
